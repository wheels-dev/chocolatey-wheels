name: Auto-Update Package

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
  # Fired by wheels-dev/wheels release workflow on every published release
  # (snapshot or final). Cuts the wait between an upstream release and a
  # bumped package from up-to-24h (cron) down to ~5min. The event types
  # are static strings under our control — no untrusted input is interpolated.
  repository_dispatch:
    types:
      - wheels-released
      - lucli-released

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: windows-latest
    steps:
      # AUTO_MERGE_PAT (a fine-grained PAT scoped to this repo with
      # Contents: write + Pull requests: write) is used for git push, gh pr
      # create, and gh pr merge. Without it, those operations run under the
      # default GITHUB_TOKEN, which suppresses the resulting push and
      # pull_request events. That means the publish-on-merge.yml workflow
      # (which listens for push: master) never fires after auto-update merges
      # its PR — leaving the chocolatey gallery un-published.
      # Falls back to GITHUB_TOKEN when the PAT secret is unset; auto-update
      # still merges, but publish-on-merge needs to be triggered manually.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installScript = Get-Content tools/chocolateyinstall.ps1 -Raw
          $currentLucli = [regex]::Match($installScript, 'lucliVersion = "([^"]+)"').Groups[1].Value
          $currentModule = [regex]::Match($installScript, 'moduleVersion = "([^"]+)"').Groups[1].Value
          "current_lucli=$currentLucli" >> $env:GITHUB_OUTPUT
          "current_module=$currentModule" >> $env:GITHUB_OUTPUT

          $latestLucli = (gh release view --repo cybersonic/LuCLI --json tagName -q '.tagName') -replace '^v', ''
          "latest_lucli=$latestLucli" >> $env:GITHUB_OUTPUT

          $releases = gh api '/repos/wheels-dev/wheels/releases?per_page=20' | ConvertFrom-Json
          $latestModule = ($releases | Where-Object { $_.assets.name -match 'wheels-module.*\.zip' } | Select-Object -First 1).tag_name -replace '^v', ''
          "latest_module=$latestModule" >> $env:GITHUB_OUTPUT

          $needsUpdate = ($currentLucli -ne $latestLucli -and $latestLucli) -or ($currentModule -ne $latestModule -and $latestModule)
          "needs_update=$($needsUpdate.ToString().ToLower())" >> $env:GITHUB_OUTPUT

      - name: Update install script
        if: steps.check.outputs.needs_update == 'true'
        shell: pwsh
        env:
          LUCLI_VER: ${{ steps.check.outputs.latest_lucli }}
          MODULE_VER: ${{ steps.check.outputs.latest_module }}
        run: |
          $lucliVer = $env:LUCLI_VER
          $moduleVer = $env:MODULE_VER

          # Recompute wheels-core SHA so the install-time integrity check
          # matches the bumped moduleVersion. Without this the next install
          # would throw on hash mismatch.
          $frameworkUrl = "https://github.com/wheels-dev/wheels/releases/download/v${moduleVer}/wheels-core-${moduleVer}.zip"
          $tempZip = Join-Path $env:RUNNER_TEMP "wheels-core-${moduleVer}.zip"
          Invoke-WebRequest -Uri $frameworkUrl -OutFile $tempZip -UseBasicParsing
          $frameworkSha = (Get-FileHash -Path $tempZip -Algorithm SHA256).Hash
          Remove-Item $tempZip -Force

          $content = Get-Content tools/chocolateyinstall.ps1 -Raw
          $content = $content -replace 'lucliVersion = "[^"]+"', "lucliVersion = `"$lucliVer`""
          $content = $content -replace 'moduleVersion = "[^"]+"', "moduleVersion = `"$moduleVer`""
          $content = $content -replace '\$frameworkExpectedHash = "[A-F0-9]+"', "`$frameworkExpectedHash = `"$frameworkSha`""
          Set-Content tools/chocolateyinstall.ps1 $content

          # Nuspec version is a 4-part NuGet version: <lucli>.<module-build-number>.
          # This lets us cut a new chocolatey release on every upstream module bump
          # even when LuCLI itself hasn't moved (the common case during snapshot
          # development). NuGet/chocolatey natively support Major.Minor.Patch.Revision.
          # Example: lucli 0.3.7 + module 4.0.0-SNAPSHOT+1606 -> nuspec 0.3.7.1606.
          $moduleBuild = ""
          if ($moduleVer -match '\+(\d+)$') {
            $moduleBuild = $Matches[1]
          }
          if ([string]::IsNullOrWhiteSpace($moduleBuild)) {
            # Fall back to plain lucliVer for tagged final releases that don't
            # carry a build-number suffix.
            $packageVersion = $lucliVer
          } else {
            $packageVersion = "$lucliVer.$moduleBuild"
          }

          [xml]$nuspec = Get-Content wheels.nuspec
          $nuspec.package.metadata.version = $packageVersion
          $nuspec.Save("wheels.nuspec")

      - name: Create PR
        if: steps.check.outputs.needs_update == 'true'
        shell: bash
        env:
          # See checkout step at top of job for full rationale. Using the PAT
          # here ensures `git push`, `gh pr create`, AND `gh pr merge` all run
          # under credentials that propagate events — so the merge to master
          # actually fires the publish-on-merge.yml workflow.
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          LUCLI_VER="${{ steps.check.outputs.latest_lucli }}"
          MODULE_VER="${{ steps.check.outputs.latest_module }}"
          BRANCH="auto-update/lucli-${LUCLI_VER}-module-${MODULE_VER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: update to LuCLI ${LUCLI_VER}, module ${MODULE_VER}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update to LuCLI ${LUCLI_VER}, module ${MODULE_VER}" \
            --body "Auto-update from upstream releases." \
            --label "auto-update"

          PR_URL=$(gh pr list --head "$BRANCH" --json url -q '.[0].url')
          if [ -n "$PR_URL" ]; then
            gh pr merge "$PR_URL" --squash --delete-branch
          fi
